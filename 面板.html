
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>功能面板</title>
    <style>
        /* 文字描边 */
        .text-stroke {
            color: #fff;
            -webkit-text-stroke: 0.4px rgba(0, 0, 0, 0.6);
            paint-order: stroke fill;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
            -webkit-font-smoothing: antialiased;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: transparent;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 整体缩放包装层 */
        #scale-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            transition: transform 0.2s ease-out;
        }

        /* 面板容器 */
        .panel {
            width: 380px;
            position: relative;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .panel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: brightness(0.9);
        }

        .liquid-glass {
            position: relative;
            z-index: 1;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1.2px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: url(#liquid_filter) blur(0.5px);
            -webkit-backdrop-filter: url(#liquid_filter) blur(10px);
        }

        .content {
            padding: 24px 20px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 18px;
        }

        .tab-indicator {
            position: absolute;
            top: 5px; left: 5px;
            height: calc(100% - 10px);
            background: rgba(255, 255, 255, 0.12);
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .tab {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 1;
            outline: none;
        }

        .tab.active { color: #fff; }

        .tab-content {
            display: none;
            height: 164px; /* 固定为三排的高度 */
            overflow-y: auto;
            padding-right: 4px;
        }

        /* 隐藏滚动条但保留功能 */
        .tab-content::-webkit-scrollbar {
            width: 4px;
        }
        .tab-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .tab-content.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 2px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            backdrop-filter: brightness(1.1);
        }

        .span-2 {
            grid-column: span 2;
        }

        .btn:active {
            transform: scale(0.92);
            background: rgba(0, 0, 0, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            letter-spacing: 3px;
        }

        .svg-filter { position: absolute; width: 0; height: 0; overflow: hidden; }
    </style>
</head>
<body>

<div id="scale-wrapper">
    <div class="panel" id="panel">
        <div class="panel-bg" id="panelBg"></div>
        <div class="liquid-glass" id="liquidGlass">
            <div class="content">
                <div class="title text-stroke">功能面板</div>

                <div class="tabs" id="tabsContainer">
                    <div class="tab-indicator" id="tabIndicator"></div>
                    <button class="tab active" onclick="switchTab(this, 'account')">账号</button>
                    <button class="tab" onclick="switchTab(this, 'resource')">资源</button>
                    <button class="tab" onclick="switchTab(this, 'feature')">功能</button>
                </div>

                <div class="tab-content active" id="account">
                    <div class="grid">
                        <button class="btn text-stroke" onclick="window.JsBridge.exportAccount()">导出账号</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.importAccount()">导入账号</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleCookieLogin()">Cookie登录</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleCookieExport()">导出Cookie</button>
                    </div>
                </div>

                <div class="tab-content" id="resource">
                    <div class="grid">
                        <button class="btn text-stroke" onclick="window.JsBridge.loadMaterial()">加载材质</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.extractMaterial()">解压材质</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleXray()">矿物透视</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.deleteEN()">清理资源</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.selectBranch()">分支加载</button>
                    </div>
                </div>

                <div class="tab-content" id="feature">
                    <div class="grid">
                        <button class="btn text-stroke" onclick="window.JsBridge.FPSdisplay()">显示FPS</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleFreeCam()">灵魂出窍</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleNightVision()">夜视效果</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleDepthOfField()">XX模糊</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.summonVehicle()">召唤坐骑</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.loadPyScript()">传送菜单</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.autofish()">自动钓鱼</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleHitEffect()">攻击闪电</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleHeartTrail()">爱心拖尾</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.executePythonScript('https://1818062054.v.123pan.cn/1818062054/34679760')">移动加速</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.toggleAutoTool()">自动工具</button>
                        <button class="btn text-stroke" onclick="window.JsBridge.startServerIpCapture()">获取服务器ip</button>
                        <!-- 可以使用executePythonScript传递脚本直链实现远程脚本加载
                        <button class="btn text-stroke" onclick="window.JsBridge.executePythonScript('脚本直链')">脚本功能名字</button> -->
                    </div>
                </div>
                <div class="footer text-stroke">LIQUID GLASS SYSTEM</div>
            </div>
        </div>
    </div>
</div>

<svg class="svg-filter">
    <defs>
        <filter id="liquid_filter" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
            <feImage id="feImage" result="map" preserveAspectRatio="none" />
            <feDisplacementMap in="SourceGraphic" in2="map" scale="60" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<canvas id="displacementCanvas" style="display:none;"></canvas>

<script>
    const scaleWrapper = document.getElementById('scale-wrapper');
    const panel = document.getElementById('panel');
    const feImage = document.getElementById('feImage');
    const canvas = document.getElementById('displacementCanvas');
    const ctx = canvas.getContext('2d');

    function autoScale() {
        scaleWrapper.style.transform = 'scale(1)';
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const panelW = panel.offsetWidth;
        const panelH = panel.offsetHeight;

        const scaleX = (winW * 0.94) / panelW;
        const scaleY = (winH * 0.94) / panelH;

        const finalScale = Math.min(scaleX, scaleY, 1);
        scaleWrapper.style.transform = `scale(${finalScale})`;

        requestAnimationFrame(updateRefraction);
    }

    function updateRefraction() {
        const w = panel.offsetWidth;
        const h = panel.offsetHeight;
        if (w === 0 || h === 0) return;

        canvas.width = w;
        canvas.height = h;
        const imgData = ctx.createImageData(w, h);
        const data = imgData.data;

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const nx = (x / w) * 2 - 1;
                const ny = (y / h) * 2 - 1;
                const edgeDist = Math.sqrt(Math.pow(Math.abs(nx), 10) + Math.pow(Math.abs(ny), 10));
                data[i] = (0.5 + nx * edgeDist * 0.3) * 255;
                data[i+1] = (0.5 + ny * edgeDist * 0.3) * 255;
                data[i+3] = 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        feImage.setAttribute('href', canvas.toDataURL());
        feImage.setAttribute('width', w);
        feImage.setAttribute('height', h);
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(id).classList.add('active');

        updateTabIndicator(el);
        autoScale();
    }

    function updateTabIndicator(el) {
        const indicator = document.getElementById('tabIndicator');
        const containerRect = document.getElementById('tabsContainer').getBoundingClientRect();
        const tabRect = el.getBoundingClientRect();
        const scale = parseFloat(scaleWrapper.style.transform.replace(/[^\d.]/g, '')) || 1;

        indicator.style.left = ((tabRect.left - containerRect.left) / scale) + 'px';
        indicator.style.width = (tabRect.width / scale) + 'px';
    }

    async function changeBg() {
        const url = 'https://api.yppp.net/pc.php?t=' + Date.now();
        const img = new Image();
        img.onload = () => document.getElementById('panelBg').style.backgroundImage = `url(${url})`;
        img.src = url;
    }

    window.onload = () => {
        changeBg();
        autoScale();
        setInterval(changeBg, 20000);
        window.addEventListener('resize', autoScale);
        updateTabIndicator(document.querySelector('.tab.active'));
    };
</script>
</body>
</html>
